<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="智学秘伴 - 用户登录">
    <title>智学秘伴 | 用户登录</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: url('../images/bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 100, 0, 0.7) 0%, rgba(34, 139, 34, 0.7) 100%);
            z-index: -1;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .back-home a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .back-home a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #4CAF50, #2E7D32);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: white;
            margin-bottom: 15px;
        }

        .logo-icon {
            font-size: 2.5rem;
            color: #4CAF50;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .welcome-text {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 5px;
        }

        h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input1 {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input1::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .input1:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 1.1rem;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.9);
        }

        .remember input {
            width: 16px;
            height: 16px;
            accent-color: #4CAF50;
        }

        .forgot {
            color: #4CAF50;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .forgot:hover {
            color: #81C784;
            text-decoration: underline;
        }

        .button1 {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            margin-bottom: 25px;
        }

        .button1:hover {
            background: linear-gradient(135deg, #43A047 0%, #1B5E20 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .button1:active {
            transform: translateY(0);
        }

        .button1:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .extra {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .extra a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: all 0.3s ease;
        }

        .extra a:hover {
            color: #81C784;
            text-decoration: underline;
        }

        .social-login {
            margin-top: 25px;
            text-align: center;
        }

        .social-title {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
            font-size: 0.9rem;
            position: relative;
        }

        .social-title::before, .social-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .social-title::before {
            left: 0;
        }

        .social-title::after {
            right: 0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .social-icon:nth-child(1) { color: #1877F2; } /* Facebook */
        .social-icon:nth-child(2) { color: #1DA1F2; } /* Twitter */
        .social-icon:nth-child(3) { color: #DB4437; } /* Google */

        .login-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.2);
            color: #C8E6C9;
            border: 1px solid #4CAF50;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            color: #FFCDD2;
            border: 1px solid #F44336;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 30px 25px;
            }
            
            .back-home {
                top: 10px;
                left: 10px;
            }
            
            h2 {
                font-size: 1.6rem;
            }
            
            .input1 {
                padding: 14px 20px 14px 45px;
            }
            
            .button1 {
                padding: 14px;
            }
        }

        @media (max-height: 600px) {
            body {
                align-items: flex-start;
                padding-top: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="back-home">
        <a href="./index.html">
            <i class="fas fa-arrow-left"></i>
            返回首页
        </a>
    </div>

    <div class="login-container">
        <div class="logo-area">
            <div class="logo">
                <i class="fas fa-seedling logo-icon"></i>
                <span class="logo-text">智学秘伴</span>
            </div>
            <p class="welcome-text">欢迎回到学习社区</p>
        </div>

        <h2>用户登录</h2>
        
        <div id="loginMessage" class="login-message"></div>
        
        <div class="input-group">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="username" class="input1" placeholder="用户名/邮箱/手机号" autocomplete="username">
        </div>
        
        <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="input1" placeholder="密码" autocomplete="current-password">
            <button type="button" class="password-toggle" id="togglePassword">
                <i class="fas fa-eye"></i>
            </button>
        </div>
        
        <div class="remember-forgot">
            <label class="remember">
                <input type="checkbox" id="rememberMe">
                记住我
            </label>
            <a href="#" class="forgot">忘记密码?</a>
        </div>
        
        <button class="button1" id="loginBtn">登 录</button>
        
        <div class="social-login">
            <p class="social-title">其他登录方式</p>
            <div class="social-icons">
                <a href="#" class="social-icon">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a href="#" class="social-icon">
                    <i class="fab fa-twitter"></i>
                </a>
                <a href="#" class="social-icon">
                    <i class="fab fa-google"></i>
                </a>
            </div>
        </div>
        
        <div class="extra">
            还没有账号? <a href="./register.html">立即注册</a>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const loginBtn = document.getElementById('loginBtn');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const rememberMeCheckbox = document.getElementById('rememberMe');
            const loginMessage = document.getElementById('loginMessage');
            const forgotPasswordLink = document.querySelector('.forgot');
            
            // 检查本地存储是否有保存的用户名
            const savedUsername = localStorage.getItem('rememberedUsername');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                rememberMeCheckbox.checked = true;
            }
            
            // 密码显示/隐藏切换
            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
            // 表单验证函数
            function validateForm() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                
                // 清除之前的消息
                loginMessage.style.display = 'none';
                loginMessage.className = 'login-message';
                
                if (!username) {
                    showMessage('请输入用户名', 'error');
                    usernameInput.focus();
                    return false;
                }
                
                if (!password) {
                    showMessage('请输入密码', 'error');
                    passwordInput.focus();
                    return false;
                }
                
                if (password.length < 6) {
                    showMessage('密码长度不能少于6位', 'error');
                    passwordInput.focus();
                    return false;
                }
                
                return true;
            }
            
            // 显示消息函数
            function showMessage(message, type) {
                loginMessage.textContent = message;
                loginMessage.className = `login-message ${type}-message`;
                loginMessage.style.display = 'block';
                
                // 如果是错误消息，添加抖动效果
                if (type === 'error') {
                    loginMessage.style.animation = 'shake 0.5s ease-in-out';
                    setTimeout(() => {
                        loginMessage.style.animation = '';
                    }, 500);
                }
            }
            
            // 登录按钮点击事件
            loginBtn.addEventListener('click', function() {
                if (!validateForm()) return;
                
                // 模拟登录过程
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';
                
                // 模拟API请求延迟
                setTimeout(() => {
                    const username = usernameInput.value.trim();
                    const password = passwordInput.value;
                    
                    // 这里应该是实际的登录验证逻辑
                    // 模拟登录成功（实际项目中应验证用户名和密码）
                    if (username && password) {
                        // 保存记住我选项
                        if (rememberMeCheckbox.checked) {
                            localStorage.setItem('rememberedUsername', username);
                        } else {
                            localStorage.removeItem('rememberedUsername');
                        }
                        
                        // 显示成功消息
                        showMessage('登录成功！正在跳转...', 'success');
                        
                        // 模拟跳转到首页
                        setTimeout(() => {
                            window.location.href = './index.html';
                        }, 1500);
                    } else {
                        // 模拟登录失败
                        showMessage('用户名或密码错误', 'error');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '登 录';
                    }
                }, 1500);
            });
            
            // 回车键登录
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loginBtn.click();
                }
            });
            
            // 忘记密码链接
            forgotPasswordLink.addEventListener('click', function(e) {
                e.preventDefault();
                showMessage('密码重置功能正在开发中...', 'error');
            });
            
            // 社交登录按钮
            document.querySelectorAll('.social-icon').forEach(icon => {
                icon.addEventListener('click', function(e) {
                    e.preventDefault();
                    showMessage('社交登录功能正在开发中...', 'error');
                });
            });
            
            // 页面加载动画
            document.querySelector('.login-container').style.opacity = 0;
            setTimeout(() => {
                document.querySelector('.login-container').style.transition = 'opacity 0.8s ease';
                document.querySelector('.login-container').style.opacity = 1;
            }, 100);
        });
    </script>
</body>
</html>
